services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: ${APP_ENV}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_CANDIDATES_TABLE: ${SUPABASE_CANDIDATES_TABLE}
      SUPABASE_APPLICATIONS_TABLE: ${SUPABASE_APPLICATIONS_TABLE}
      ALLOW_MOCK_STORAGE: ${ALLOW_MOCK_STORAGE}
      CORS_ORIGINS: ${CORS_ORIGINS}
    restart: unless-stopped

  telegram-bot:
    build:
      context: ./telegram-bot
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      BACKEND_BASE_URL: http://backend:8000
      BOT_STORAGE_PATH: /app/.bot_state.json
      OPENAI_FEEDBACK_ENABLED: ${OPENAI_FEEDBACK_ENABLED}
      SESSION_TIMEOUT_HOURS: ${SESSION_TIMEOUT_HOURS}
    depends_on:
      - backend
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${PUBLIC_PORT:-80}:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
